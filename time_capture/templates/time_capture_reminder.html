{% block content %}
	<p>Hallo {{ employee_name }},</p>

	<p>Hier sind deine offenen Zeiterfassungen:</p>

	{% if time_captures_per_employee %}
		<p>Offene Zeiterfassungen:</p>
		<ul>
			{% for tc in time_captures_per_employee %}
				<li>{{ tc.date }}: {{ tc.name }}</li>
			{% endfor %}
		</ul>
	{% endif %}
{% endblock %}
